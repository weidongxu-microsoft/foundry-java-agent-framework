server.port=8088
spring.application.name=foundry-java-hosted-agent
# Quiet the banner / keep logs to stdout for Foundry log streaming.
spring.main.banner-mode=off
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{0} - %msg%n
# The Java Agent Framework hosting module serves the Foundry Responses endpoint.
agent-framework.responses.path=/responses
# Host-owned conversation history store: memory (SDK parity default) or file
# ($HOME/.checkpoints/conversations, durable across process restarts within a session).
# Overridable at runtime via CONVERSATION_STORE env.
agent-framework.conversation-store=${CONVERSATION_STORE:file}
